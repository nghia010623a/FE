<!DOCTYPE html>

<style>
.category-btn {
  background: rgba(255,255,255,0.1);
  transition: all 0.25s ease;
}

.category-btn:hover {
  background: rgba(255,255,255,0.2);
}

/* NÚT ĐANG ĐƯỢC CHỌN */
/* Tạo hiệu ứng bập bùng cho ngọn lửa */
@keyframes flicker {
  0%, 100% { 
    transform: scale(1.5) rotate(-5deg); 
    filter: drop-shadow(0 0 5px #ffea00);
  }
  50% { 
    transform: scale(1.8) rotate(10deg); 
    filter: drop-shadow(0 0 15px #ff4500);
  }
}

/* Đưa ngọn lửa ra góc trên bên phải */
.fire-badge {
  position: absolute;
  top: -12px;     /* Nhảy lên phía trên một chút */
  right: -8px;    /* Nhảy ra bên phải một chút */
  font-size: 1.5rem;
  animation: flicker 1.6s ease-in-out infinite;
  z-index: 10;    /* Đảm bảo nó luôn nằm trên cùng */
  pointer-events: none; /* Để không bị vướng khi bấm nút */
}

/* Đảm bảo nút không bị cắt mất ngọn lửa khi nó nằm ngoài rìa */
.category-btn {
  overflow: visible !important;
}

/* Thêm hiệu ứng phát sáng cho nút Best Seller */
[data-category="best-seller"] {
  box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.5) !important;
}
@keyframes floaty {
  0% {
    transform: translateY(0px) rotate(0deg);
  }
  25% {
    transform: translateY(-10px) rotate(-2deg);
  }
  50% {
    transform: translateY(-20px) rotate(2deg);
  }
  75% {
    transform: translateY(-10px) rotate(-1deg);
  }
  100% {
    transform: translateY(0px) rotate(0deg);
  }
}

@keyframes glowPulse {
  0% {
    filter: drop-shadow(0 0 5px rgba(0, 150, 255, 0.4));
  }
  50% {
    filter: drop-shadow(0 0 25px rgba(0, 150, 255, 0.9));
  }
  100% {
    filter: drop-shadow(0 0 5px rgba(0, 150, 255, 0.4));
  }
}

@keyframes tiltHover {
  0% {
    transform: scale(1) rotate(0deg);
  }
  100% {
    transform: scale(1.08) rotate(3deg);
  }
}
.mascot {
  width: 230px;
  height: auto;
  object-fit: contain;
  animation: floaty 4s ease-in-out infinite, glowPulse 3s ease-in-out infinite;
  transition: all 0.4s ease;
}
.category-btn.active,
.category-btn.active:hover {
  background: linear-gradient(135deg, #eaf0f292, #eaf0f2aa) !important;
  color: white !important;
}
.mascot:hover {
  animation: glowPulse 1.5s infinite;
  transform: scale(1.1) rotate(5deg);
}
.glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .menu-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        
        .menu-item:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }
        
        .price-tag {
            background: linear-gradient(135deg, #10b981, #059669);
            backdrop-filter: blur(10px);
        }
        
        /* .active-category {

</style>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.category-btn')
          .forEach(b => b.classList.remove('active'));
  
        btn.classList.add('active');
      });
    });
  });
  </script>
