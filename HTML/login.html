<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bingchun - Login</title>
<!-- Tailwind CSS v3 CDN -->
<!-- Custom Font: Inter for a modern look -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- BEGIN: Tailwind Configuration -->
<!-- END: Tailwind Configuration -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="background-animations">
    :root {
      --bingchun-light: #E0F2FE;
      --bingchun-brand: #7DD3FC;
      --bingchun-brand-hover: #38bdf8;
      --bingchun-dark: #0369A1;
      --slate-50: #f8fafc;
      --slate-200: #e2e8f0;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --white: #ffffff;
    }
    .btn-retry {
    background: #f44336;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}
.btn-retry:hover { background: #d32f2f; }

    .fade-out {
  opacity: 0 !important;
  transform: scale(0.9) translateY(20px) !important;
  transition: all 0.5s ease-in-out !important;
  pointer-events: none;
}
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .modal-wrapper {
    display: none; /* Ẩn mặc định */
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5); /* Làm tối nền phía sau */
    backdrop-filter: blur(4px); /* Làm mờ nền cho chuyên nghiệp */
    z-index: 9999;
    align-items: center;
    justify-content: center;
}

.modal-box {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 400px;
    animation: zoomIn 0.3s ease-out; /* Hiệu ứng hiện ra */
}

/* Tạo Icon X */
.error-icon {
    width: 80px;
    height: 80px;
    border: 4px solid #f44336;
    border-radius: 50%;
    margin: 0 auto 20px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

.error-icon .line {
    position: absolute;
    width: 40px;
    height: 4px;
    background: #f44336;
    border-radius: 2px;
}
.error-icon .line.left { transform: rotate(45deg); }
.error-icon .line.right { transform: rotate(-45deg); }
.modal-box h2 {
    color: #f44336;
    font-family: Arial, sans-serif;
    margin-bottom: 10px;
}
.modal-box p {
    color: #666;
    margin-bottom: 25px;
}
    body {
      font-family: 'Inter', sans-serif;
      color: var(--slate-800);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
      overflow: hidden;
    }

    .animated-gradient {
      background: linear-gradient(-5deg, #f0f9ff, #e0f2fe, #bae6fd, #f0f9ff);
      background-size: 400% 400%;
      animation: gradientBG 1500000s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .blob {
      position: absolute;
      width: 500px;
      height: 500px;
      background: rgba(125, 211, 252, 0.2);
      filter: blur(80px);
      border-radius: 50%;
      z-index: -1;
    }

    .blob-top {
      top: -6rem;
      left: -6rem;
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .blob-bottom {
      bottom: -6rem;
      right: -6rem;
      animation-delay: 2s;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(19px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.346);
      border-radius: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.197);
      padding: 2rem;
      width: 100%;
      max-width: 28rem;
    }

    @media (min-width: 768px) {
      .glass-card { padding: 2.5rem; }
    }

    .login-container {
      width: 100%;
      max-width: 28rem;
    }

    .brand-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-title {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--bingchun-dark);
      margin-bottom: 0.5rem;
    }

    .brand-subtitle {
      color: var(--slate-500);
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--slate-700);
      margin-bottom: 0.5rem;
    }

    .input-field {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      border: 1px solid var(--slate-200);
      transition: all 0.2s;
      outline: none;
    }

    .input-field:focus {
      border-color: var(--bingchun-brand);
      box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.5);
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .link-small {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--bingchun-dark);
      text-decoration: none;
    }

    .link-small:hover {
      text-decoration: underline;
    }

    .btn-primary {
      width: 100%;
      background-color: var(--bingchun-brand);
      color: white;
      font-weight: 700;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 0.75rem;
      box-shadow: 0 10px 15px -3px rgba(125, 211, 252, 0.3);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background-color: var(--bingchun-brand-hover);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .divider {
      position: relative;
      margin: 2rem 0;
      text-align: center;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      border-top: 1px solid var(--slate-200);
      z-index: 0;
    }

    .divider-text {
      position: relative;
      padding: 0 1rem;
      background-color: rgba(255, 255, 255, 0.5);
      color: var(--slate-400);
      font-size: 0.875rem;
      display: inline-block;
      border-radius: 9999px;
      z-index: 1;
    }

    .btn-social {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background-color: white;
      border: 1px solid var(--slate-200);
      color: var(--slate-700);
      font-weight: 600;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .btn-social:hover {
      background-color: var(--slate-50);
    }

    .footer-redirect {
      margin-top: 2.5rem;
      text-align: center;
      color: var(--slate-600);
    }

    .link-brand {
      color: var(--bingchun-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .link-brand:hover {
      text-decoration: underline;
    }

    .support-footer {
      margin-top: 2rem;
      text-align: center;
    }

    .support-list {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 0.875rem;
      color: var(--slate-400);
      font-weight: 500;
    }

    .support-link {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }

    .support-link:hover {
      color: var(--bingchun-dark);
    }

    .svg-icon {
      width: 1.25rem;
      height: 1.25rem;
    }
    </style>
<!-- END: Custom Styles -->
</head>
<body class="animated-gradient">
<!-- BEGIN: Decorative Background Elements -->
<div class="blob blob-top"></div>
<div class="blob blob-bottom" style="animation-delay: 2s;"></div>
<!-- END: Decorative Background Elements -->
<!-- BEGIN: Login Container -->
<main class="login-container" data-purpose="login-container">
<div class="glass-card">
<!-- BEGIN: Logo and Header -->
<div class="brand-header" data-purpose="brand-identity">
<h1 class="brand-title" style="">BingChun</h1>
<p class="brand-subtitle" style="">Chào mừng bạn quay trở lại! Vui lòng nhập thông tin.</p>
</div>
<!-- END: Logo and Header -->
<!-- BEGIN: Login Form -->
<form class="" id="loginForm" novalidate>
<!-- Email Field -->
<div class="form-group">
<label class="label" for="email" style="">Email hoặc Tên đăng nhập</label>
<input class="input-field" id="email" name="email" placeholder="Nhập email của bạn" required="" type="text"/>
</div>
<!-- Password Field -->
<div class="form-group">
<div class="flex-between">
<label class="label" for="password" style="">Mật khẩu</label>
<a class="link-small" data-purpose="forgot-password-link" href="#" style="">Quên mật khẩu?</a>
</div>
<input class="input-field" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Login Button -->
<button class="btn-primary"  style="" type="submit">Đăng nhập</button>
</form>
<!-- END: Login Form -->
<!-- BEGIN: Social Login Divider -->
<div class="divider" data-purpose="divider"><span class="divider-text">Hoặc tiếp tục với</span></div>
<!-- END: Social Login Divider -->
<!-- BEGIN: Social Login Buttons -->
<div class="space-y-4" data-purpose="social-auth">
<button class="btn-social" style="" id="loginwithgoogle">
<!-- Google Icon (SVG) -->
<svg class="svg-icon" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
         Đăng nhập với Google
        </button>
</div>
<!-- END: Social Login Buttons -->
<!-- BEGIN: Footer Links -->
<div class="footer-redirect" data-purpose="signup-redirect">
  <footer class="form-footer" data-purpose="form-footer" >
    <main id="main-card" class="glass-card animate-pop-in" style="padding: 15px;background-color: rgba(9, 131, 201, 0.362);">
      <p class="login-footer">
        Chưa có tài khoản? 
        <a id="signup-link" class="signuplink" style="text-decoration:none;color:rgb(13,25,28)" href="regist.html">
          Đăng ký
        </a>
      </p>
    </main></footer></div>
    
    



<!-- END: Footer Links -->
</div>
<!-- BEGIN: Support Links -->
<footer class="support-footer" data-purpose="extra-links">
<ul class="support-list">
<li class=""><a class="support-link" href="#" style="">Chính sách bảo mật</a></li>
<li class=""><a class="support-link" href="#" style="">Điều khoản dịch vụ</a></li>
</ul>
</footer>
<!-- END: Support Links -->
</main>
<!-- END: Login Container -->
<div id="errorModal" class="modal-wrapper">
  <div class="modal-box">
      <div class="error-icon">
          <div class="line left"></div>
          <div class="line right"></div>
      </div>
      
      <h2>Đăng nhập thất bại!</h2>
      <p id="message"></p>
      
      <button onclick="closeErrorModal()" class="btn-retry">Thử lại</button>
  </div>
</div>
 <script src="../js/login.js"></script>
</body></html>
