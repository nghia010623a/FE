<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BingChun - Quên mật khẩu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: linear-gradient(-5deg, #f0f9ff, #e0f2fe, #bae6fd, #f0f9ff);
    }
    .glass-card {
      width: 100%;
      max-width: 28rem;
      padding: 2rem;
      border-radius: 1.5rem;
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    }
    h1 { color: #0369a1; font-size: 1.75rem; margin-bottom: 0.5rem; text-align: center; }
    p.sub { color: #64748b; text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .step { display: none; }
    .step.active { display: block; }
    label { display: block; font-size: 0.875rem; font-weight: 600; color: #334155; margin-bottom: 0.5rem; }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 0.75rem;
      border: 1px solid #e2e8f0;
      margin-bottom: 1rem;
      outline: none;
    }
    input:focus { border-color: #7dd3fc; box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.45); }
    .btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 0.75rem;
      background: #7dd3fc;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:hover { background: #38bdf8; }
    .btn-secondary { background: transparent; color: #0369a1; border: 1px solid #bae6fd; margin-top: 0.75rem; }
    .msg { font-size: 0.875rem; text-align: center; margin-bottom: 1rem; min-height: 1.25rem; }
    .msg.error { color: #dc2626; }
    .msg.ok { color: #059669; }
    .back { display: block; text-align: center; margin-top: 1.25rem; color: #0369a1; text-decoration: none; font-weight: 600; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1>Quên mật khẩu</h1>
    <p class="sub">Nhận mã xác nhận qua Gmail để đặt lại mật khẩu</p>
    <div id="msg" class="msg"></div>

    <div id="step-email" class="step active">
      <label for="email">Email đăng ký</label>
      <input id="email" type="email" placeholder="email@example.com" required/>
      <button class="btn" id="btn-send-code" type="button">Gửi mã xác nhận</button>
    </div>

    <div id="step-reset" class="step">
      <label for="code">Mã xác nhận (8 ký tự)</label>
      <input id="code" type="text" maxlength="8" placeholder="Ab12Cd34" autocomplete="one-time-code"/>
      <label for="newPassword">Mật khẩu mới</label>
      <input id="newPassword" type="password" placeholder="Ít nhất 6 ký tự"/>
      <label for="confirmPassword">Nhập lại mật khẩu</label>
      <input id="confirmPassword" type="password" placeholder="••••••••"/>
      <button class="btn" id="btn-reset" type="button">Đặt lại mật khẩu</button>
      <button class="btn btn-secondary" id="btn-resend" type="button">Gửi lại mã</button>
    </div>

    <a class="back" href="login.html">← Quay lại đăng nhập</a>
  </div>
  <script src="../JS/config.js"></script>
  <script src="../JS/forgotPassword.js"></script>
</body>
</html>
