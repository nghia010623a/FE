<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bingchun - Đang chuyển hướng...</title>
<!-- BEGIN: Base Styles -->
<style data-purpose="base-layout">
    :root {
      --primary-blue: #3b82f6;
      --bg-light-blue: #e0f2fe;
      --glass-bg: rgba(255, 255, 255, 0.4);
      --glass-border: rgba(255, 255, 255, 0.6);
      --text-dark: #1e293b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body, html {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background-color: var(--bg-light-blue);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Animated gradient background for extra depth */
    .bg-gradient-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8) 0%, rgba(224, 242, 254, 1) 100%);
      z-index: -2;
    }
  </style>
<!-- END: Base Styles -->
<!-- BEGIN: Animation Styles -->
<style data-purpose="animations">
    @keyframes floating {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes bubbleRise {
      0% { transform: translateY(100vh) scale(1); opacity: 0; }
      20% { opacity: 0.6; }
      80% { opacity: 0.6; }
      100% { transform: translateY(-100px) scale(1.2); opacity: 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .animate-float {
      animation: floating 3s ease-in-out infinite;
    }

    .animate-pop-in {
      animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
  </style>
<!-- END: Animation Styles -->
<!-- BEGIN: Component Styles -->
<style data-purpose="components">
    /* Glassmorphism Container */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 2rem;
      padding: 3rem;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
      text-align: center;
      width: 90%;
      max-width: 500px;
      z-index: 10;
      position: relative;
    }

    /* Mascot Handling */
    .mascot-container {
      width: 220px;
      height: 220px;
      margin: 0 auto 2rem;
      position: relative;
      /* Clipping the image to focus on the mascot character top part if needed, 
         but here we assume image 5 is the main source */
      overflow: visible;
    }

    .mascot-image {
      width: 100%;
      height: auto;
      display: block;
      /* Centering and scaling logic */
      object-fit: contain;
    }

    /* Typography */
    .status-title {
      color: var(--text-dark);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .status-subtitle {
      color: #64748b;
      font-size: 1rem;
      margin-bottom: 2rem;
      animation: pulse 2s infinite;
    }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      height: 12px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.5);
      position: relative;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 10px;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
    }

    /* Decorative Bubbles (Boba Pearls) */
    .bubble {
      position: absolute;
      background: rgba(0, 0, 0, 0.15); /* Dark pearls */
      border-radius: 50%;
      z-index: -1;
      pointer-events: none;
    }

    .bubble-light {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
  </style>
<!-- END: Component Styles -->
</head>
<body>
<!-- BEGIN: Background Elements -->
<div class="bg-gradient-overlay" data-purpose="background-base"></div>
<div data-purpose="background-decorations" id="bubble-container">
<!-- Bubbles generated by JS -->
</div>
<!-- END: Background Elements -->
<!-- BEGIN: Main Content -->
<main class="glass-card animate-pop-in" data-purpose="loading-card">
<!-- Mascot Section -->
<div class="mascot-container animate-float" data-purpose="brand-mascot">
<img alt="Bingchun Mascot" class="mascot-image" id="mascot-img" src="../binglogo.png">
</div>
<!-- Text Information -->
<section data-purpose="status-text">
<h1 class="status-title">Bingchun Xin Chào!</h1>
<p class="status-subtitle">Đang chuẩn bị trải nghiệm của bạn, chờ một chút nhé...</p>
</section>
<!-- Progress Indicator -->
<div class="progress-container" data-purpose="progress-tracker">
<div class="progress-bar" id="progress-bar"></div>
</div>
<!-- Footer Text -->
<p style="margin-top: 1.5rem; font-size: 0.75rem; color: #94a3b8; letter-spacing: 0.05em;">
      EST 2026 • ICE CREAM &amp; TEA
    </p>
</main>
<!-- END: Main Content -->
<!-- BEGIN: Dynamic Interactivity -->
<script data-purpose="bubble-generator">
    /**
     * Creates floating background bubbles (boba pearls)
     */
    function createBubbles() {
      const container = document.getElementById('bubble-container');
      const count = 15;

      for (let i = 0; i < count; i++) {
        const bubble = document.createElement('div');
        const size = Math.random() * (40 - 10) + 10;
        const isLight = Math.random() > 0.7;
        
        bubble.className = isLight ? 'bubble bubble-light' : 'bubble';
        bubble.style.width = `${size}px`;
        bubble.style.height = `${size}px`;
        bubble.style.left = `${Math.random() * 100}vw`;
        
        // Randomize animation duration and delay
        const duration = Math.random() * (10 - 5) + 5;
        const delay = Math.random() * 5;
        
        bubble.style.animation = `bubbleRise ${duration}s linear ${delay}s infinite`;
        
        container.appendChild(bubble);
      }
    }
    
    createBubbles();
  </script>
<script data-purpose="progress-logic">
    /**
     * Mô phỏng tiến trình tải hoàn thành chính xác trong 3 giây
     */
    function startLoading() {
      const progressBar = document.getElementById('progress-bar');
      const duration = 2000; // Tổng thời gian là 3000ms (3 giây)
      const frameRate = 19;  // Cập nhật mỗi 10ms để chuyển động mượt mà
      let elapsedTime = 0;
      
      const interval = setInterval(() => {
        elapsedTime += frameRate;
        let progress = (elapsedTime / duration) * 100;

        if (progress >= 100) {
          progress = 100;
          clearInterval(interval);
          // Bạn có thể thêm lệnh chuyển trang ở đây sau khi hoàn tất
          window.location.href = '../index.html';
        }
        
        progressBar.style.width = progress + '%';
      }, frameRate);
    }

    // Kích hoạt sau khi hiệu ứng pop-in ban đầu kết thúc
    setTimeout(startLoading, 800);
</script>
<script data-purpose="image-cleanup">
    /**
     * Since the source image contains both mascot and text, 
     * this script ensures we focus on the mascot visually by 
     * adjusting object position if needed.
     */
    window.onload = () => {
      const img = document.getElementById('mascot-img');
      // Potential adjustment to crop the "BING CHUN" text part 
      // if the provided image is a full logo sheet.
      // Based on dimensions 1167x949, the mascot is roughly the top 70%.
      img.style.objectPosition = 'top center';
      img.style.height = '140%'; // zoom in slightly to hide text footer
      img.parentElement.style.overflow = 'hidden';
    };
  </script>
<!-- END: Dynamic Interactivity -->
</body></html>
